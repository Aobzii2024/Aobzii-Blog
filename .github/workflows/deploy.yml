name: Deploy Blog-Main to ECS

on:
  push:
    branches: [ "main" ] # 监听 main 分支
    paths:
      - "Blog-Main/**" # 只监听 Blog-Main 目录的变化
      - ".github/workflows/deploy.yml"
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  deploy:
    runs-on: ubuntu-latest # 使用 GitHub 的 Ubuntu 服务器运行
    steps:
      - name: Remote deploy via SSH
        uses: appleboy/ssh-action@v1.2.0 # 使用现成的 SSH 插件
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # known_hosts: ${{ secrets.SERVER_KNOWN_HOSTS }} # 如果报错可尝试开启此项
          script: |
            set -e
            # 下面是你在服务器上实际要执行的命令
            # 假设你已经在服务器上写好了 /opt/Aobzii-Blog/deploy.sh 脚本
            /opt/Aobzii-Blog/deploy.sh
