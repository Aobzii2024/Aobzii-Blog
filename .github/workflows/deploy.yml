name: Deploy Blog-Main to ECS

on:
  push:
    branches: ["main"]
    paths:
      - "Blog-Main/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Validate required secrets
        run: |
          [ -n "${{ secrets.SERVER_HOST }}" ] || (echo "SERVER_HOST is missing"; exit 1)
          [ -n "${{ secrets.SERVER_USER }}" ] || (echo "SERVER_USER is missing"; exit 1)
          [ -n "${{ secrets.SERVER_PORT }}" ] || (echo "SERVER_PORT is missing"; exit 1)
          [ -n "${{ secrets.SERVER_SSH_KEY }}" ] || (echo "SERVER_SSH_KEY is missing"; exit 1)

      - name: Build Hexo
        working-directory: Blog-Main
        run: |
          pnpm install --frozen-lockfile
          pnpm run verify

      - name: Clean remote web root
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            mkdir -p /var/www/ramblings.aobzii.top
            find /var/www/ramblings.aobzii.top -mindepth 1 -delete

      - name: Upload public files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "Blog-Main/public/*"
          target: "/var/www/ramblings.aobzii.top"

      - name: Reload nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            nginx -t
            systemctl reload nginx
