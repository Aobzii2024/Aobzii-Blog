name: Deploy Blog-Main to ECS

on:
  push:
    branches: ["main"]
    paths:
      - "Blog-Main/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          [ -n "${{ secrets.SERVER_HOST }}" ] || (echo "SERVER_HOST is missing"; exit 1)
          [ -n "${{ secrets.SERVER_USER }}" ] || (echo "SERVER_USER is missing"; exit 1)
          [ -n "${{ secrets.SERVER_PORT }}" ] || (echo "SERVER_PORT is missing"; exit 1)
          [ -n "${{ secrets.SERVER_SSH_KEY }}" ] || (echo "SERVER_SSH_KEY is missing"; exit 1)

      - name: Remote deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          known_hosts: ${{ secrets.SERVER_KNOWN_HOSTS }}
          script: |
            set -e
            /opt/Aobzii-Blog/deploy.sh
